<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Tonda Talusi - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .active-link { @apply bg-indigo-700 border-l-4 border-yellow-400; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        #media-modal { display: none; }
        .modal-active { display: flex !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <div id="media-modal" class="fixed inset-0 bg-black/90 z-[200] items-center justify-center p-4">
        <div class="bg-white w-full max-w-5xl h-[80vh] rounded-2xl overflow-hidden flex flex-col relative">
            <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                <h3 id="modal-title" class="font-bold text-indigo-900 truncate pr-8">Media Pembelajaran</h3>
                <button onclick="closeMedia()" class="text-red-500 hover:text-red-700 text-2xl">&times;</button>
            </div>
            <div id="modal-body" class="flex-1 bg-black"></div>
        </div>
    </div>

    <div id="auth-overlay" class="fixed inset-0 bg-indigo-950 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-yellow-400">
            <div class="text-center mb-8">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Lambang_Kabupaten_Donggala_%282015-sekarang%29.png" class="h-16 mx-auto mb-4 object-contain">
                <h2 class="text-2xl font-bold text-indigo-900 leading-tight">LMS Tonda Talusi</h2>
                <p class="text-gray-500 text-sm">Silakan masuk untuk melanjutkan</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="login-email" placeholder="Email@belajar.id" class="w-full p-3 border-2 rounded-xl outline-none focus:border-indigo-500">
                <input type="password" id="login-pass" placeholder="Password" class="w-full p-3 border-2 rounded-xl outline-none focus:border-indigo-500">
                <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold hover:bg-indigo-700 transition">MASUK</button>
            </div>
        </div>
    </div>

    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-indigo-950 text-white flex-shrink-0 hidden md:flex flex-col">
            <div class="p-6 text-xl font-bold border-b border-indigo-900 tracking-widest text-yellow-400">TONDA TALUSI</div>
            <nav id="sidebar-nav" class="flex-1 p-4 space-y-1 overflow-y-auto hide-scroll">
                <div id="nav-admin" class="hidden py-2 border-b border-indigo-900 mb-2">
                    <p class="px-3 text-[10px] font-bold text-yellow-500 uppercase mb-2">Manajemen</p>
                    <button onclick="showSection('admin-users')" class="w-full text-left p-3 hover:bg-indigo-800 rounded-lg flex items-center text-sm"><i class="fa fa-users-cog w-6 text-yellow-400"></i>Kelola User</button>
                    <button onclick="showSection('monitor-aktivitas')" class="w-full text-left p-3 hover:bg-indigo-800 rounded-lg flex items-center text-sm"><i class="fa fa-chart-line w-6 text-yellow-400"></i>Rekap Nilai</button>
                </div>
                <div id="nav-guru" class="hidden py-2">
                    <p class="px-3 text-[10px] font-bold text-indigo-400 uppercase mb-2">Pendidik</p>
                    <button onclick="showSection('guru-materi')" class="w-full text-left p-3 hover:bg-indigo-800 rounded-lg flex items-center text-sm"><i class="fa fa-upload w-6"></i>Kelola Materi</button>
                    <button onclick="showSection('guru-ujian')" class="w-full text-left p-3 hover:bg-indigo-800 rounded-lg flex items-center text-sm"><i class="fa fa-edit w-6"></i>Kelola Ujian</button>
                </div>
                <div id="nav-siswa" class="hidden py-2">
                    <p class="px-3 text-[10px] font-bold text-indigo-400 uppercase mb-2">Siswa</p>
                    <button onclick="showSection('siswa-materi')" class="w-full text-left p-3 hover:bg-indigo-800 rounded-lg flex items-center text-sm"><i class="fa fa-book w-6"></i>Materi Belajar</button>
                    <button onclick="showSection('siswa-ujian')" class="w-full text-left p-3 hover:bg-indigo-800 rounded-lg flex items-center text-sm"><i class="fa fa-pen-nib w-6"></i>Ujian & Kuis</button>
                </div>
            </nav>
            <div class="p-4 bg-black/30">
                <div id="user-display" class="text-xs font-bold text-yellow-400 mb-1 truncate">...</div>
                <div id="role-badge" class="text-[9px] bg-yellow-500 text-black px-2 py-0.5 rounded-full inline-block mb-3 uppercase font-black">...</div>
                <button onclick="handleLogout()" class="w-full bg-red-600/20 text-red-400 p-2 rounded text-xs border border-red-600/30">LOGOUT</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white p-5 shadow-sm sticky top-0 z-40 flex justify-between items-center">
                <h2 id="section-title" class="text-lg font-bold text-indigo-900 uppercase tracking-wide">Dashboard</h2>
                <div id="timer-box" class="hidden bg-red-600 text-white px-4 py-2 rounded-full font-mono animate-pulse shadow-lg">
                    <i class="fa fa-clock mr-2"></i><span id="timer-count">00:00</span>
                </div>
            </header>
            <div id="main-content" class="p-6 max-w-6xl mx-auto w-full"></div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAu4HfC2TQGf_LZPIDRiW-02iZiXeKo6js",
            authDomain: "kombeltondatalusi.firebaseapp.com",
            databaseURL: "https://kombeltondatalusi-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "kombeltondatalusi",
            storageBucket: "kombeltondatalusi.firebasestorage.app",
            messagingSenderId: "490296730086",
            appId: "1:490296730086:web:c5e9250de6230bf8a4b627"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();
        
        const SUPER_ADMIN_EMAIL = "abd.fajar81@guru.belajar.id";
        let userSession = null, activeTimer = null;

        // --- AUTH ---
        async function handleLogin() {
            const e = document.getElementById('login-email').value, p = document.getElementById('login-pass').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert("Gagal Masuk: " + err.message); }
        }
        function handleLogout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').classList.add('hidden');
                db.ref('users/' + user.uid).on('value', snap => {
                    userSession = snap.val() || { name: user.email, role: 'siswa' };
                    userSession.uid = user.uid;
                    userSession.email = user.email;

                    // Force Super Admin Logic
                    if(user.email.toLowerCase() === SUPER_ADMIN_EMAIL.toLowerCase()) {
                        userSession.role = "superadmin";
                    }

                    document.getElementById('user-display').innerText = userSession.name;
                    document.getElementById('role-badge').innerText = userSession.role;
                    setupNavigation(userSession.role);
                    showSection('siswa-materi');
                });
            }
        });

        function setupNavigation(role) {
            const adminNav = document.getElementById('nav-admin');
            const guruNav = document.getElementById('nav-guru');
            const siswaNav = document.getElementById('nav-siswa');

            if(role === 'superadmin' || role === 'admin') {
                adminNav.classList.remove('hidden');
                guruNav.classList.remove('hidden');
                siswaNav.classList.remove('hidden');
            } else if(role === 'guru') {
                guruNav.classList.remove('hidden');
                siswaNav.classList.remove('hidden');
            } else {
                siswaNav.classList.remove('hidden');
            }
        }

        // --- SECTION ROUTER ---
        function showSection(id) {
            const content = document.getElementById('main-content');
            document.getElementById('section-title').innerText = id.replace('-', ' ').toUpperCase();
            
            if (id === 'admin-users') {
                content.innerHTML = `
                    <div class="grid md:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-xl border shadow-sm h-fit">
                            <h3 class="font-bold mb-4 text-indigo-900 border-b pb-2">Tambah Pengguna</h3>
                            <div class="space-y-3">
                                <input id="reg-name" placeholder="Nama Lengkap" class="w-full p-2 border rounded text-sm">
                                <input id="reg-email" placeholder="Email @belajar.id" class="w-full p-2 border rounded text-sm">
                                <input id="reg-pass" type="password" placeholder="Password" class="w-full p-2 border rounded text-sm">
                                <select id="reg-role" class="w-full p-2 border rounded text-sm bg-gray-50">
                                    <option value="siswa">Siswa</option>
                                    <option value="guru">Guru</option>
                                    <option value="admin">Admin</option>
                                </select>
                                <p class="text-[10px] text-gray-400">*Gunakan email unik untuk pendaftaran.</p>
                                <button onclick="adminCreateUser()" class="w-full bg-indigo-600 text-white p-2 rounded font-bold hover:bg-indigo-700">DAFTARKAN USER</button>
                            </div>
                        </div>
                        <div class="md:col-span-2 bg-white p-6 rounded-xl border shadow-sm">
                            <h3 class="font-bold mb-4 text-indigo-900 border-b pb-2">Daftar Pengguna</h3>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left text-sm">
                                    <thead><tr class="bg-gray-50 text-gray-500"><th class="p-3">Nama</th><th class="p-3">Role</th><th class="p-3">Aksi</th></tr></thead>
                                    <tbody id="user-list-table"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>`;
                fetchUserList();
            } 
            else if (id === 'guru-materi') {
                content.innerHTML = `
                    <div class="bg-white p-6 rounded-xl border mb-6 shadow-sm">
                        <h3 class="font-bold mb-4 flex items-center"><i class="fa fa-plus-circle mr-2 text-indigo-600"></i> Buat Materi Baru</h3>
                        <div class="space-y-3">
                            <input id="m-id" type="hidden"><input id="m-title" placeholder="Judul Materi" class="w-full p-2 border rounded outline-none focus:border-indigo-500">
                            <textarea id="m-desc" placeholder="Deskripsi materi atau instruksi tugas..." class="w-full p-2 border rounded h-24 outline-none focus:border-indigo-500"></textarea>
                            <input id="m-link" placeholder="Link (YouTube / Google Drive)" class="w-full p-2 border rounded outline-none focus:border-indigo-500">
                            <button onclick="saveMateri()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold">SIMPAN MATERI</button>
                        </div>
                    </div>
                    <div id="materi-manage-list" class="space-y-3"></div>`;
                fetchMateriControl();
            } 
            else if (id === 'guru-ujian') {
                content.innerHTML = `
                    <div class="bg-white p-6 rounded-xl border mb-6 shadow-sm">
                        <h3 class="font-bold mb-4 text-indigo-900 flex items-center"><i class="fa fa-file-signature mr-2"></i> Konfigurasi Ujian</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            <input id="q-id" type="hidden">
                            <input id="q-title" placeholder="Nama Ujian" class="p-2 border rounded">
                            <select id="q-cat" class="p-2 border rounded bg-gray-50">
                                <option value="Ujian Harian">Ujian Harian</option>
                                <option value="UTS">Ujian Tengah Semester (UTS)</option>
                                <option value="UAS">Ujian Akhir Semester (UAS)</option>
                            </select>
                            <input id="q-dur" type="number" placeholder="Durasi (Menit)" class="p-2 border rounded">
                        </div>
                        <div id="q-container" class="space-y-4"></div>
                        <div class="mt-6 pt-4 border-t flex gap-2">
                            <button onclick="addQField()" class="bg-yellow-500 text-white px-4 py-2 rounded font-bold text-sm">+ TAMBAH SOAL</button>
                            <button onclick="saveQuiz()" class="bg-indigo-600 text-white px-4 py-2 rounded font-bold text-sm">PUBLIKASIKAN</button>
                        </div>
                    </div>
                    <div id="quiz-manage-list" class="space-y-3"></div>`;
                addQField();
                fetchQuizControl();
            }
            else if (id === 'siswa-materi') {
                content.innerHTML = `<div id="siswa-materi-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>`;
                fetchMateriSiswa();
            }
            else if (id === 'siswa-ujian') {
                content.innerHTML = `<div id="siswa-quiz-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>`;
                fetchQuizSiswa();
            }
            else if (id === 'monitor-aktivitas') {
                content.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-indigo-900">Rekapitulasi Hasil Belajar</h3>
                        <button onclick="exportToExcel()" class="bg-green-600 text-white px-4 py-2 rounded text-xs font-bold shadow-md hover:bg-green-700 transition"><i class="fa fa-file-excel mr-2"></i>DOWNLOAD EXCEL</button>
                    </div>
                    <div id="report-container" class="space-y-2"></div>`;
                fetchReports();
            }
        }

        // --- USER MANAGEMENT (ADMIN ONLY) ---
        function adminCreateUser() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const role = document.getElementById('reg-role').value;

            if(!name || !email || !pass) return alert("Lengkapi data!");

            // Note: In real production, this should be done via Firebase Admin SDK (Cloud Functions)
            // But for this client-side version, we create the entry in Database.
            // User still needs to sign up or Admin creates via Firebase Console.
            const tempRef = db.ref('users').push();
            tempRef.set({ name, email, role }).then(() => {
                alert("Data user ditambahkan ke database!");
                showSection('admin-users');
            });
        }

        function fetchUserList() {
            db.ref('users').on('value', snap => {
                const list = document.getElementById('user-list-table');
                if(!list) return; list.innerHTML = "";
                snap.forEach(child => {
                    const u = child.val();
                    // Admin cannot see or delete Super Admin
                    if(u.email.toLowerCase() !== SUPER_ADMIN_EMAIL.toLowerCase()) {
                        list.innerHTML += `<tr class="border-b hover:bg-gray-50 transition">
                            <td class="p-3 font-semibold text-indigo-900">${u.name}<br><span class="text-[10px] text-gray-400 font-normal">${u.email}</span></td>
                            <td class="p-3"><span class="px-2 py-1 rounded text-[10px] uppercase font-black ${u.role==='admin'?'bg-red-100 text-red-600': u.role==='guru' ? 'bg-blue-100 text-blue-600' : 'bg-green-100 text-green-600'}">${u.role}</span></td>
                            <td class="p-3">
                                <button onclick="deleteUser('${child.key}')" class="text-red-400 hover:text-red-600 p-2"><i class="fa fa-trash-alt"></i></button>
                            </td>
                        </tr>`;
                    }
                });
            });
        }
        function deleteUser(uid) { if(confirm("Hapus pengguna ini selamanya?")) db.ref('users/'+uid).remove(); }

        // --- MATERI LOGIC ---
        function saveMateri() {
            const id = document.getElementById('m-id').value;
            const data = {
                title: document.getElementById('m-title').value,
                desc: document.getElementById('m-desc').value,
                link: document.getElementById('m-link').value,
                teacher: userSession.name,
                tUid: userSession.uid,
                date: new Date().toLocaleString()
            };
            const ref = id ? db.ref('materials/' + id) : db.ref('materials').push();
            ref.set(data).then(() => { alert("Materi Berhasil Disimpan!"); showSection('guru-materi'); });
        }

        function fetchMateriControl() {
            db.ref('materials').on('value', snap => {
                const list = document.getElementById('materi-manage-list');
                if(!list) return; list.innerHTML = "";
                snap.forEach(child => {
                    const m = child.val();
                    // Guru, Admin, SuperAdmin can edit/delete
                    list.innerHTML += `<div class="bg-white p-4 border rounded-xl flex justify-between items-center shadow-sm border-l-4 border-indigo-500">
                        <div><b class="text-indigo-900 block">${m.title}</b><p class="text-[10px] text-gray-400 uppercase tracking-tighter">Oleh: ${m.teacher} | ${m.date}</p></div>
                        <div class="flex gap-2">
                            <button onclick="editM('${child.key}')" class="bg-blue-50 text-blue-600 p-2 rounded-lg hover:bg-blue-600 hover:text-white transition"><i class="fa fa-edit"></i></button>
                            <button onclick="deleteM('${child.key}')" class="bg-red-50 text-red-600 p-2 rounded-lg hover:bg-red-600 hover:text-white transition"><i class="fa fa-trash"></i></button>
                        </div>
                    </div>`;
                });
            });
        }

        function editM(id) {
            db.ref('materials/'+id).once('value', snap => {
                const m = snap.val();
                document.getElementById('m-id').value = id;
                document.getElementById('m-title').value = m.title;
                document.getElementById('m-desc').value = m.desc;
                document.getElementById('m-link').value = m.link;
                window.scrollTo(0,0);
            });
        }
        function deleteM(id) { if(confirm("Hapus materi ini?")) db.ref('materials/'+id).remove(); }

        // --- QUIZ LOGIC ---
        function addQField(val = {q: '', opt: ['', '', '', ''], ans: 0}) {
            const container = document.getElementById('q-container');
            const d = document.createElement('div');
            d.className = "p-5 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200 q-item relative";
            d.innerHTML = `
                <button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-gray-300 hover:text-red-500"><i class="fa fa-times-circle"></i></button>
                <input class="w-full p-2 border rounded mb-3 q-txt font-bold text-sm" placeholder="Pertanyaan..." value="${val.q}">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    ${val.opt.map((o, i) => `<div class="flex items-center bg-white border rounded p-1"><span class="px-3 font-bold text-gray-400">${String.fromCharCode(65+i)}</span><input class="w-full p-2 q-opt text-sm outline-none" placeholder="Pilihan..." value="${o}"></div>`).join('')}
                </div>
                <div class="mt-4 flex items-center text-xs font-bold">
                    <span class="text-indigo-600 mr-2 uppercase">Kunci Jawaban:</span>
                    <select class="p-2 border rounded q-ans bg-white outline-none">
                        <option value="0" ${val.ans==0?'selected':''}>Opsi A</option>
                        <option value="1" ${val.ans==1?'selected':''}>Opsi B</option>
                        <option value="2" ${val.ans==2?'selected':''}>Opsi C</option>
                        <option value="3" ${val.ans==3?'selected':''}>Opsi D</option>
                    </select>
                </div>`;
            container.appendChild(d);
        }

        function saveQuiz() {
            const id = document.getElementById('q-id').value;
            const questions = [];
            document.querySelectorAll('.q-item').forEach(item => {
                const opts = []; item.querySelectorAll('.q-opt').forEach(o => opts.push(o.value));
                questions.push({ q: item.querySelector('.q-txt').value, opt: opts, ans: parseInt(item.querySelector('.q-ans').value) });
            });
            const data = {
                title: document.getElementById('q-title').value,
                category: document.getElementById('q-cat').value,
                duration: parseInt(document.getElementById('q-dur').value),
                questions, tUid: userSession.uid, teacher: userSession.name
            };
            const ref = id ? db.ref('quizzes/' + id) : db.ref('quizzes').push();
            ref.set(data).then(() => { alert("Paket Ujian Berhasil Dirilis!"); showSection('guru-ujian'); });
        }

        function fetchQuizControl() {
            db.ref('quizzes').on('value', snap => {
                const list = document.getElementById('quiz-manage-list');
                if(!list) return; list.innerHTML = "";
                snap.forEach(child => {
                    const q = child.val();
                    list.innerHTML += `<div class="bg-white p-4 border rounded-xl flex justify-between items-center shadow-sm border-l-4 border-yellow-500">
                        <div>
                            <span class="text-[9px] bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full font-bold uppercase">${q.category || 'Umum'}</span>
                            <b class="block text-indigo-900 mt-1">${q.title}</b>
                            <p class="text-[10px] text-gray-400 uppercase tracking-tighter">${q.questions.length} Soal • ${q.duration} Menit • Oleh: ${q.teacher}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editQ('${child.key}')" class="bg-blue-50 text-blue-600 p-2 rounded-lg hover:bg-blue-600 hover:text-white transition"><i class="fa fa-edit"></i></button>
                            <button onclick="deleteQ('${child.key}')" class="bg-red-50 text-red-600 p-2 rounded-lg hover:bg-red-600 hover:text-white transition"><i class="fa fa-trash"></i></button>
                        </div>
                    </div>`;
                });
            });
        }

        function editQ(id) {
            db.ref('quizzes/'+id).once('value', snap => {
                const q = snap.val();
                document.getElementById('q-id').value = id;
                document.getElementById('q-title').value = q.title;
                document.getElementById('q-dur').value = q.duration;
                if(q.category) document.getElementById('q-cat').value = q.category;
                document.getElementById('q-container').innerHTML = "";
                q.questions.forEach(item => addQField(item));
                window.scrollTo(0,0);
            });
        }
        function deleteQ(id) { if(confirm("Hapus paket ujian ini?")) db.ref('quizzes/'+id).remove(); }

        // --- SISWA VIEW ---
        function fetchMateriSiswa() {
    db.ref('materials').on('value', snap => {
        const list = document.getElementById('siswa-materi-list');
        if(!list) return; list.innerHTML = "";
        snap.forEach(child => {
            const m = child.val();
            // Membersihkan deskripsi dari tanda kutip agar tidak error di onclick
            const safeDesc = m.desc.replace(/'/g, "\\'").replace(/\n/g, "<br>");
            
            list.innerHTML += `<div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                <div class="h-2 w-12 bg-indigo-500 rounded-full mb-4"></div>
                <h4 class="font-bold text-indigo-900 leading-tight mb-2 h-12 overflow-hidden">${m.title}</h4>
                <p class="text-xs text-gray-500 line-clamp-3 mb-4">${m.desc}</p>
                <div class="flex justify-between items-center pt-4 border-t">
                    <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest"><i class="fa fa-user-circle mr-1"></i> ${m.teacher}</span>
                    ${m.link ? `<button onclick="openMedia('${m.title}', '${m.link}', '${safeDesc}')" class="bg-indigo-600 text-white text-[10px] px-3 py-1.5 rounded-full font-black shadow-lg">BUKA MEDIA</button>` : ''}
                </div>
            </div>`;
        });
    });
}

        function fetchQuizSiswa() {
            db.ref('quizzes').on('value', snap => {
                const list = document.getElementById('siswa-quiz-list');
                if(!list) return; list.innerHTML = "";
                snap.forEach(child => {
                    const q = child.val();
                    list.innerHTML += `<div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm relative overflow-hidden">
                        <div class="absolute top-0 right-0 bg-yellow-400 text-[8px] font-black px-3 py-1 rounded-bl-xl uppercase">${q.category || 'Ujian'}</div>
                        <h4 class="font-bold text-indigo-900 mb-1">${q.title}</h4>
                        <p class="text-[10px] text-gray-400 mb-4 tracking-tighter"><i class="fa fa-clock mr-1 text-yellow-500"></i> ${q.duration} MENIT | ${q.questions.length} SOAL</p>
                        <button onclick="startExam('${child.key}')" class="w-full bg-indigo-50 text-indigo-600 py-2 rounded-xl text-xs font-black hover:bg-indigo-600 hover:text-white transition">MULAI SEKARANG</button>
                    </div>`;
                });
            });
        }

        function startExam(id) {
            db.ref('quizzes/'+id).once('value', snap => {
                const q = snap.val();
                let time = q.duration * 60;
                document.getElementById('timer-box').classList.remove('hidden');
                
                activeTimer = setInterval(() => {
                    let m = Math.floor(time / 60), s = time % 60;
                    document.getElementById('timer-count').innerText = `${m}:${s.toString().padStart(2,'0')}`;
                    if(time <= 0) submitExam(id);
                    time--;
                }, 1000);

                document.getElementById('main-content').innerHTML = `
                    <div class="mb-6 p-4 bg-indigo-900 text-white rounded-xl shadow-lg">
                        <h3 class="font-bold text-xl">${q.title}</h3>
                        <p class="text-xs opacity-70 italic">Selesaikan soal dengan teliti. Jangan me-refresh halaman.</p>
                    </div>
                ` + q.questions.map((item, idx) => `
                    <div class="bg-white p-6 rounded-2xl border mb-4 shadow-sm">
                        <p class="font-bold mb-4 text-indigo-900">${idx+1}. ${item.q}</p>
                        <div class="space-y-2">${item.opt.map((o, i) => `
                            <label class="flex items-center p-3 border rounded-xl cursor-pointer hover:bg-indigo-50 transition border-gray-100">
                                <input type="radio" name="ans${idx}" value="${i}" class="mr-3 w-4 h-4 accent-indigo-600"> 
                                <span class="text-sm font-medium text-gray-700">${o}</span>
                            </label>`).join('')}</div>
                    </div>
                `).join('') + `<button onclick="submitExam('${id}')" class="w-full bg-green-600 text-white p-5 rounded-2xl font-black shadow-xl hover:bg-green-700 mb-20 transition">KIRIM SEMUA JAWABAN</button>`;
                window.scrollTo(0,0);
            });
        }

        async function submitExam(quizId) {
            clearInterval(activeTimer);
            document.getElementById('timer-box').classList.add('hidden');
            const snap = await db.ref('quizzes/' + quizId).once('value');
            const quiz = snap.val();
            let score = 0;
            quiz.questions.forEach((q, idx) => {
                const sel = document.querySelector(`input[name="ans${idx}"]:checked`);
                if (sel && parseInt(sel.value) === q.ans) score++;
            });
            const finalScore = Math.round((score / quiz.questions.length) * 100);
            db.ref('reports').push({
                studentName: userSession.name,
                quizTitle: quiz.title,
                category: quiz.category || "Ujian",
                score: finalScore,
                date: new Date().toLocaleString()
            }).then(() => {
                alert(`Hasil Dikirim! Skor Anda: ${finalScore}`);
                showSection('siswa-ujian');
            });
        }

        // --- MEDIA & REPORTS ---
        function openMedia(title, url, description) {
    const body = document.getElementById('modal-body');
    document.getElementById('modal-title').innerText = title;
    
    let embedUrl = url;
    if (url.includes('youtube.com') || url.includes('youtu.be')) {
        const vidId = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
        embedUrl = `https://www.youtube.com/embed/${vidId}`;
    } else if (url.includes('drive.google.com')) {
        embedUrl = url.replace('/view', '/preview').replace('/edit', '/preview');
    }

    // Mengubah tampilan modal: Deskripsi di atas, Media di bawah
    body.innerHTML = `
        <div class="flex flex-col h-full bg-white">
            <div class="p-6 overflow-y-auto border-b bg-gray-50" style="max-height: 200px;">
                <h4 class="font-bold text-indigo-900 mb-2">Deskripsi Materi:</h4>
                <p class="text-gray-700 whitespace-pre-wrap text-sm">${description}</p>
            </div>
            <div class="flex-1 bg-black">
                <iframe src="${embedUrl}" class="w-full h-full" allowfullscreen frameborder="0"></iframe>
            </div>
        </div>
    `;
    document.getElementById('media-modal').classList.add('modal-active');
}
        function closeMedia() { document.getElementById('media-modal').classList.remove('modal-active'); }

        function fetchReports() {
            db.ref('reports').on('value', snap => {
                const list = document.getElementById('report-container');
                if(!list) return; list.innerHTML = "";
                snap.forEach(child => {
                    const r = child.val();
                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm">
                            <div>
                                <p class="font-bold text-indigo-900 text-sm">${r.studentName}</p>
                                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">${r.category} : ${r.quizTitle}</p>
                                <p class="text-[9px] text-gray-400 font-medium italic">${r.date}</p>
                            </div>
                            <div class="text-2xl font-black ${r.score >= 70 ? 'text-green-600' : 'text-red-600'}">${r.score}</div>
                        </div>`;
                });
            });
        }

        function exportToExcel() {
            const data = [];
            db.ref('reports').once('value', snap => {
                snap.forEach(c => {
                    const r = c.val();
                    data.push({ "Siswa": r.studentName, "Kategori": r.category, "Ujian": r.quizTitle, "Nilai": r.score, "Waktu": r.date });
                });
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Rekap");
                XLSX.writeFile(wb, "RekapNilai_TondaTalusi.xlsx");
            });
        }
    </script>
